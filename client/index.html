<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DBC Care — Appointments</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%231a6b63' width='32' height='32' rx='8'/%3E%3Cpath fill='%23e8f6f3' d='M14 6h4v8h8v4h-8v8h-4v-8H6v-4h8z'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=43" />
</head>
<body>
  <div class="atmosphere" aria-hidden="true"></div>
  <div id="banner" class="banner" hidden></div>

  <div class="shell">
    <header class="topbar">
      <a class="back-link" href="/" title="Back to home">←</a>
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div class="brand-text">
          <div class="title">DBC Care</div>
          <div class="subtitle">Appointments</div>
        </div>
      </div>

      <div class="topbar-right">
        <div id="backend-chip" class="backend-chip" title="Set providers in Admin">
          <span class="field-label">Backend</span>
          <span id="backend-label">Loading…</span>
        </div>
        <label class="field-inline">
          <span class="field-label">Mic</span>
          <select id="mic-select" class="device-select" title="Microphone" disabled>
            <option value="">Browser default</option>
          </select>
        </label>
        <div class="status-chip">
          <span id="status-dot" class="status-dot" title="disconnected"></span>
          <span id="status-text" class="status-text">disconnected</span>
        </div>
      </div>
    </header>

    <main id="chat" class="chat">
      <div class="welcome" id="welcome-strip">
        <p class="welcome-kicker">Front desk</p>
        <h2 class="welcome-title">Chat or call — same thread</h2>
        <p class="welcome-copy">One window for chat and calls. Providers are chosen in Admin — not in this screen.</p>
      </div>
      <div id="messages" class="messages"></div>
      <div id="avg-response-panel" class="avg-panel" aria-live="polite" hidden>
        <div class="avg-row">
          <span class="avg-label">Avg first text</span>
          <span id="avg-text-value" class="avg-value">—</span>
        </div>
        <div class="avg-row">
          <span class="avg-label">Avg first audio</span>
          <span id="avg-voice-value" class="avg-value">—</span>
        </div>
      </div>
    </main>

    <section id="call-dock" class="call-dock" hidden>
      <div class="call-dock-inner">
        <div class="call-visual">
          <div id="orb" class="orb dock-orb"></div>
          <div class="call-copy">
            <div id="voice-status" class="voice-status">Listening…</div>
            <div id="voice-mic-feedback" class="voice-mic-feedback">Waiting for your voice…</div>
            <div id="voice-caption" class="voice-caption"></div>
          </div>
        </div>
        <div id="voice-mic-indicator" class="voice-mic-indicator" aria-live="polite">
          <div class="mic-wave" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="call-actions">
          <select id="voice-mic-select" class="device-select voice-mic-select" title="Microphone">
            <option value="">Browser default</option>
          </select>
          <button id="voice-vad" class="voice-vad" type="button" title="Voice detection sensitivity (applies on next call)">VAD: Sensitive</button>
          <button id="voice-mute" class="voice-mute" type="button" title="Mute microphone">Mute</button>
          <button id="voice-close" class="voice-close" type="button" title="End call">End call</button>
        </div>
      </div>
    </section>

    <footer class="composer">
      <form id="composer-form" class="composer-form">
        <input
          id="text-input"
          class="text-input"
          type="text"
          placeholder="Message DBC Care…"
          autocomplete="off"
        />
        <button id="vad-button" type="button" class="action-button vad" title="Voice detection sensitivity (applies when you start a call)">
          <span id="vad-button-label">VAD: Sensitive</span>
        </button>
        <button id="mic-button" type="button" class="action-button voice" title="Start voice call">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span id="mic-button-label">Call</span>
        </button>
        <button id="send-button" type="submit" class="action-button primary" title="Send">
          <span>Send</span>
        </button>
      </form>
    </footer>
  </div>

  <audio id="bot-audio" autoplay></audio>
  <script type="module" src="app.js?v=51"></script>
</body>
</html>
